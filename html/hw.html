<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Practice Webpage</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header class="site-header">
    <h1>Student Practice Webpage</h1>
    <p>HTML + CSS Practice (Forms + Table Advanced)</p>
  </header>

  <!-- ── MAIN WRAPPER ── -->
  <main class="container">

    <!-- ── SECTION 1 : IMAGE ── -->
    <section class="card">
      <h2 class="section-title">Image Section</h2>
      <img src ="/image/24701-nature-natural-beauty.jpg" alt="Scenic nature" />
    </section>

    <!-- ── SECTION 2 : ADVANCED TABLE ── -->
    <section class="card">
      <h2 class="section-title">Advanced Table</h2>
      <table border="1" cellpadding="10" cellspacing="0">
        <thead>
          <tr>
            <th rowspan="2">Name</th>
            <th colspan="2">Scores</th>
            <th rowspan="2">Grade</th>
          </tr>
          <tr>
            <th>Math</th>
            <th>CS</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Alice</td>
            <td>90</td>
            <td>95</td>
            <td>A</td>
          </tr>
          <tr>
            <td>Bob</td>
            <td>80</td>
            <td>85</td>
            <td>B</td>
          </tr>
        </tbody>
      </table>
    </section>

    <!-- ── SECTION 3 : FORM 1 ── -->
    <section class="card form-card">
      <h2 class="form-title">Form 1: Basic Info</h2>

      <div class="form-group">
        <label for="name">Name <span class="required">*</span></label>
        <input type="text" id="name" name="name" />
      </div>

      <div class="form-group">
        <label for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" name="email" />
      </div>

      <div class="form-group">
        <label for="password">Password <span class="required">*</span></label>
        <input type="password" id="password" name="password" />
      </div>

      <div class="form-group">
        <label for="file">Upload File</label>
        <input type="file" id="file" name="file" class="file-input" />
      </div>

      <div class="btn-row">
        <button type="submit" class="btn btn-primary">Submit</button>
        <button type="reset"  class="btn btn-secondary">Reset</button>
      </div>
    </section>

    <!-- ── SECTION 4 : FORM 2 ── -->
    <section class="card form-card">
      <h2 class="form-title">Form 2: Survey Form</h2>

      <div class="form-group">
        <label for="course">Choose Course <span class="required">*</span></label>
        <select id="course" name="course">
          <option value="">-- Select --</option>
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="js">JavaScript</option>
          <option value="python">Python</option>
        </select>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <div class="radio-group">
          <label class="inline-label">
            <input type="radio" name="gender" value="male" /> Male
          </label>
          <label class="inline-label">
            <input type="radio" name="gender" value="female" /> Female
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Skills</label>
        <div class="checkbox-group">
          <label class="inline-label"><input type="checkbox" name="skills" value="html" /> HTML</label>
          <label class="inline-label"><input type="checkbox" name="skills" value="css"  /> CSS</label>
          <label class="inline-label"><input type="checkbox" name="skills" value="js"   /> JS</label>
        </div>
      </div>

      <div class="form-group">
        <label for="phone">Phone <span class="required">*</span></label>
        <input type="tel" id="phone" name="phone" />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4"></textarea>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn btn-primary">Send</button>
      </div>
    </section>

  </main>
</body>
</html>
