<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div class = "Sign In">
    <h1> HTML Forms</h1>
  <h2> Sign In Form </h2>
  <form action="/submit-form" method="post">
    <label for="email">email:</label>
    <input type="email" id="email" name="email" required, placeholder="enter your email"><br><br>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required, placeholder="Enter your password"><br><br>
    <input type="checkbox" id="remember" name="remember">
    <label for="remember">Remember me</label><br><br>
    <input type="submit" value="Sign In">
  </form> 
    <hr/>
  </div>

  <div class = "Sign Up">
    <h2> Sign Up </h2>
  <form action="/submit-form" method="post">
    <label for="fullname">Full Name:</label>
    <input type="text" id="fullname" name="fullname" required, placeholder="Enter your full name"><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required, placeholder="Enter your email"><br><br>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required, placeholder="Create your password"><br><br>
    <label for="confirm_password">Confirm Password:</label>
    <input type="password" id="confirm_password" name="confirm_password" required, placeholder="Confirm your password"><br><br>
    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number"><br><br>
    <span>
      <label for="gender">Gender:</label>
      <label id="gender" name="gender">
      <input type="radio" id="male" name="gender" value="male">
      <label for="male">Male</label>
      <input type="radio" id="female" name="gender" value="female">
      <label for="female">Female</label>
      <input type="radio" id="other " name="gender" value="other">
      <label for="other">Other</label>
    </label><br><br>
    <input type="submit" value="Sign Up">
  </form>
  <hr/>
    </span>
  </div>
  
<div class = "Contact Form">
  <h2> Contact Form </h2>
  <form action="https://formsubmit.co/chealina99.691@gmail.com" method="post", target="_blank">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required, placeholder="Enter your name"><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required, placeholder="Enter your email"><br><br>
    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="4" cols="50" placeholder="Enter your message here"></textarea><br><br>
    <input type="submit" value="Send">
    <input type="reset" value="Reset">
  </form>
  <hr/>
</div>
</body>
</html>
